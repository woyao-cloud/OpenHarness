version: '3.8'

services:
  # PostgreSQL 数据库服务
  postgres:
    image: postgres:15
    container_name: user-admin-postgres
    environment:
      POSTGRES_ROOT_PASSWORD: root
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: user_admin
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      # 挂载 SQL 初始化脚本（首次启动时自动执行）
      - ./src/main/resources/db/schema-postgres.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      # 持久化数据
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d user_admin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - user-admin-network

  # Spring Boot 应用服务
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: user-admin-app
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_admin?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JWT_SECRET: your-256-bit-secret-key-for-jwt-signing-must-be-at-least-32-characters
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - user-admin-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  user-admin-network:
    driver: bridge
